services:

  db:
    image: mysql:8.0
    container_name: app_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:                          # ← Nuevo: espera a que MySQL esté listo
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: app_api
    restart: always
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy       # ← Nuevo: espera al healthcheck
    networks:
      - app-network

  api_web:
    image: nginx:alpine
    container_name: app_api_web
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: app_frontend
    restart: "no"                        # ← Sin restart en base; el override lo sobreescribe en dev
    networks:
      - app-network

  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: app_proxy
    restart: always
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./nginx-proxy/data:/data
      - ./nginx-proxy/letsencrypt:/etc/letsencrypt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: