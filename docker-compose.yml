services:

  db:
    image: mysql:8.0
    container_name: app_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: app_api
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  api_web:
    image: nginx:alpine
    container_name: app_api_web
    restart: always
    volumes:
      - ./backend:/var/www/html
      - ./backend/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - app-network

  reverb:
    build: ./backend
    container_name: app_reverb
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: app_frontend
    restart: always
    networks:
      - app-network

  proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: app_proxy
    restart: always
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./nginx-proxy/data:/data
      - ./nginx-proxy/letsencrypt:/etc/letsencrypt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: