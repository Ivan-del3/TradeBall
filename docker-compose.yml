services:

  db:
    image: mysql:8.0
    container_name: app_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  api:
    build: ./backend
    container_name: app_api
    restart: always
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - app-network

  api_web:
    image: nginx:alpine
    container_name: app_api_web
    ports:
      - "8000:80" # Este es el puerto para la API
    volumes:
      - ./backend:/var/www/html
      - ./backend/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: app_frontend
    restart: always
    networks:
      - app-network

  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: app_proxy
    restart: always
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./nginx-proxy/data:/data
      - ./nginx-proxy/letsencrypt:/etc/letsencrypt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: