services:
  api:
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor

  frontend:
    build:
      context: ./frontend
      target: development
    restart: "no"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  api_web:
    ports:
      - "8000:80" 